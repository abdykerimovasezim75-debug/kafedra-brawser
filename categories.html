<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дисциплины</title>
    <style>
        body { background-color: #F8F0FF; font-family: sans-serif; padding: 50px; }
        .container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card h3 { color: #5B2C6F; }
        .card a { display: block; margin-top: 15px; padding: 10px; background: #9B59B6; color: white; border-radius: 10px; text-decoration: none; }
    </style>
</head>
<body>

<h1>Категории тестов</h1>

<div class="container">
    <div class="card">
        <h3>Теоретическая лингвистика</h3>
        <a href="{{ url_for('test', cat_name='theory', index=0) }}">Начать</a>
    </div>
    <div class="card">
        <h3>Основы НЛП</h3>
        <a href="{{ url_for('test', cat_name='nlp', index=0) }}">Начать</a>
    </div>
    <div class="card">
        <h3>Машинный перевод</h3>
        <a href="{{ url_for('test', cat_name='translation', index=0) }}">Начать</a>
    </div>
    <div class="card">
        <h3>Корпусная лингвистика</h3>
        <a href="{{ url_for('test', cat_name='corpus', index=0) }}">Начать</a>
    </div>
    <div class="card">
        <h3>Python для лингвистов</h3>
        <a href="{{ url_for('test', cat_name='python', index=0) }}">Начать</a>
    </div>
    <div class="card">
        <h3>Базы данных (SQL)</h3>
        <a href="{{ url_for('test', cat_name='sql', index=0) }}">Начать</a>
    </div>
</div>

</body>
</html>
