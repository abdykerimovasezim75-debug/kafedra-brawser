<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><title>Вопрос {{ q_index }} из {{ total_q }}</title></head>
<body style="font-family: sans-serif; background-color: #f5edfa; padding: 20px;">
    <div style="background: white; max-width: 600px; margin: 20px auto; padding: 30px; border-radius: 15px;">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ba68c8; padding-bottom: 10px; margin-bottom: 20px;">
            <span style="font-weight: bold; color: #555;">Вопрос {{ q_index }} из {{ total_q }}</span>
            <span style="background-color: #f3e5f5; color: #ba68c8; padding: 5px 15px; border-radius: 15px; font-weight: bold;">
                ⏱ Осталось: <span id="countdown">{{ timer_string }}</span>
            </span>
        </div>
        
        <form id="testForm" method="POST">
            <p style="font-size: 18px; font-weight: bold; color: #222; margin-bottom: 25px;">{{ q.text }}</p>
            
            {% for variant in q.variants %}
                <label style="display: block; background: #fafafa; padding: 15px; border: 1px solid #ddd; margin-bottom: 12px; border-radius: 10px; cursor: pointer;">
                    <input type="radio" name="variant" value="{{ variant }}" {% if variant == saved_answer %}checked{% endif %} required> 
                    <span style="margin-left: 10px;">{{ variant }}</span>
                </label>
            {% endfor %}

            <div style="display: flex; justify-content: space-between; margin-top: 35px;">
                {% if q_index > 1 %}
                    <button type="submit" name="action" value="prev" style="background-color: white; border: 1px solid #ba68c8; color: #ba68c8; padding: 12px 30px; font-weight: bold; border-radius: 10px; cursor: pointer;">Назад</button>
                {% else %}
                    <div></div>
                {% endif %}

                {% if q_index < total_q %}
                    <button type="submit" name="action" value="next" style="background-color: #ba68c8; border: none; color: white; padding: 12px 30px; font-weight: bold; border-radius: 10px; cursor: pointer;">Далее</button>
                {% else %}
                    <button type="submit" name="action" value="submit" style="background-color: #27ae60; border: none; color: white; padding: 12px 30px; font-weight: bold; border-radius: 10px; cursor: pointer;">Завершить тест 🏁</button>
                {% endif %}
            </div>
        </form>
    </div>

    <script>
        let secondsLeft = {{ time_left_seconds }};
        const countdownEl = document.getElementById('countdown');

        const timer = setInterval(() => {
            secondsLeft--;
            if (secondsLeft <= 0) {
                clearInterval(timer);
                alert("Время вышло!");
                const hiddenAction = document.createElement('input');
                hiddenAction.type = 'hidden';
                hiddenAction.name = 'action';
                hiddenAction.value = 'submit';
                document.getElementById('testForm').appendChild(hiddenAction);
                document.getElementById('testForm').submit();
            } else {
                let mins = Math.floor(secondsLeft / 60);
                let secs = secondsLeft % 60;
                countdownEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        }, 1000);
    </script>
</body>
</html>
