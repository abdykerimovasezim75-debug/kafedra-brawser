<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вопрос {{ q_index }} из {{ total_q }}</title>
</head>
<body>
    <h2>Вопрос {{ q_index }} из {{ total_q }}</h2>
    
    <form method="POST">
        <p><strong>{{ q.text }}</strong></p>
        
        {% for variant in q.variants %}
            <label>
                <input type="radio" name="variant" value="{{ variant }}" 
                       {% if variant == saved_answer %}checked{% endif %}> 
                {{ variant }}
            </label><br><br>
        {% endfor %}

        <hr>
        
        {% if q_index > 1 %}
            <button type="submit" name="action" value="prev">⬅ Назад</button>
        {% endif %}

        {% if q_index < total_q %}
            <button type="submit" name="action" value="next">Далее ➡</button>
        {% else %}
            <button type="submit" name="action" value="submit" style="background-color: green; color: white;">Завершить тест 🏁</button>
        {% endif %}
    </form>
</body>
</html>
