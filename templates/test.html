<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Тестирование — {{ category }}</title>
    <style>
        body { background-color: #F8F0FF; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; max-width: 600px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; color: #888; margin-bottom: 20px; font-weight: bold; }
        h3 { color: #2A1A3A; margin-bottom: 25px; }
        
        /* Стили для блоков с ответами */
        .option-label {
            display: block;
            width: 100%;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .option-btn {
            display: block;
            padding: 15px;
            background: #F3EBF9;
            border: 2px solid #E2CDF4;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.2s;
            color: #2A1A3A;
        }
        /* Скрываем стандартный кружок радио-кнопки */
        .option-label input[type="radio"] {
            display: none;
        }
        /* Эффект при наведении на вариант */
        .option-label:hover .option-btn {
            background: #EAD5FA;
            border-color: #C872FC;
        }
        /* Эффект, когда радио-кнопка выбрана */
        .option-label input[type="radio"]:checked + .option-btn {
            background: #C872FC;
            color: white;
            border-color: #C872FC;
        }

        /* Кнопки навигации */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }
        .btn-back {
            color: #C872FC;
            text-decoration: none;
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 12px;
            border: 2px solid #E2CDF4;
            transition: all 0.2s;
        }
        .btn-back:hover {
            background: #F3EBF9;
        }
        .btn-submit {
            background: #C872FC;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-left: auto; /* Сдвигает кнопку "Далее" вправо, если нет кнопки "Назад" */
        }
        .btn-submit:hover {
            background: #B058E3;
        }
        .btn-finish {
            background: #27AE60;
        }
        .btn-finish:hover {
            background: #219653;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <span>Вопрос {{ index + 1 }} из {{ total }}</span>
        <span id="timer" data-time-left="{{ time_left }}">--:-- ⏱</span>
    </div>

    <h3>{{ question.text }}</h3>

    <form method="POST">
        {% for variant in question.variants %}
            <label class="option-label">
                <input type="radio" name="answer" value="{{ variant }}" 
                       {% if current_answer == variant %}checked{% endif %}>
                <span class="option-btn">{{ variant }}</span>
            </label>
        {% endfor %}

        <div class="nav-buttons">
            {% if index > 0 %}
                <a href="{{ url_for('test', cat_name=category, index=index-1) }}" class="btn-back">Назад</a>
            {% endif %}

            {% if index < total - 1 %}
                <button type="submit" name="action" value="next" class="btn-submit">Далее</button>
            {% else %}
                <button type="submit" name="action" value="finish" class="btn-submit btn-finish">Завершить тест</button>
            {% endif %}
        </div>
    </form>
</div>

<script>
    const timerDisplay = document.getElementById('timer');
    // Считываем оставшиеся секунды из Flask (если их нет, ставим дефолтные 1200)
    let timeLeft = parseInt(timerDisplay.getAttribute('data-time-left')) || 1200; 

    function updateCountdown() {
        if (timeLeft <= 0) {
            clearInterval(countdown);
            // Время вышло — автоматически перенаправляем на страницу результатов
            window.location.href = "{{ url_for('result') }}";
        } else {
            let minutes = Math.floor(timeLeft / 60);
            let seconds = timeLeft % 60;
            
            // Форматируем вывод под вид 05:09
            timerDisplay.innerText = 
                (minutes < 10 ? "0" : "") + minutes + ":" + 
                (seconds < 10 ? "0" : "") + seconds + " ⏱";
            
            timeLeft--;
        }
    }

    // Запускаем счетчик
    updateCountdown();
    const countdown = setInterval(updateCountdown, 1000);
</script>

</body>
</html>
