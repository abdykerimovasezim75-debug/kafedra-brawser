<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Превью теста</title>
</head>
<body style="font-family: sans-serif; background-color: #f5edfa; padding: 40px; text-align: center;">
    <div style="background: white; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h2 style="color: #333;">{{ meta.title }}</h2>
        <p style="color: #666;">{{ meta.desc }}</p>
        <hr style="border: 0.5px solid #ddd; margin: 20px 0;">
        <ul style="list-style: none; padding: 0; text-align: left; max-width: 300px; margin: 0 auto; line-height: 2;">
            <li>📝 <strong>{{ meta.count }} вопросов</strong></li>
            <li>⏱ <strong>20 минут</strong></li>
            <li>🧠 <strong>Базовый уровень</strong></li>
            <li>💻 <strong>Язык: Python</strong></li>
        </ul>
        <br><br>
        
        <a href="/test/start/{{ category_id }}" style="display: block; background-color: #ba68c8; color: white; text-decoration: none; padding: 15px 0; font-size: 16px; font-weight: bold; border-radius: 25px; width: 100%;">
            Начать тест
        </a>
        
        <br><br>
        <a href="/categories" style="color: #777; text-decoration: none; font-size: 14px;">Назад к темам</a>
    </div>
</body>
</html>
